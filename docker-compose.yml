# ============================================================
# new_bird - Docker Compose (Development)
# ============================================================

services:
  postgres:
    image: postgres:18-alpine
    container_name: mbird_postgres
    environment:
      POSTGRES_DB: mbird_reports
      POSTGRES_USER: mbird
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mbird_dev_2024}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbird -d mbird_reports"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mbird_api
    command: >
      uvicorn api.main:app --reload --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mbird:${DB_PASSWORD:-mbird_dev_2024}@postgres:5432/mbird_reports
      CORS_ORIGINS: https://zsc-sac.eajdias.com,http://localhost:3050
      SYNC_PROFILE: ${SYNC_PROFILE:-daily}
      SYNC_ENABLED: ${SYNC_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8050:8000"
    volumes:
      - ./api:/app/api
      - ./domain:/app/domain
      - ./application:/app/application
      - ./infrastructure:/app/infrastructure
      - ./reports:/app/reports
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mbird_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    ports:
      - "3050:3000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
